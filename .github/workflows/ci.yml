name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smartclub_test
          POSTGRES_USER: smartclub
          POSTGRES_PASSWORD: smartclub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgres://smartclub:smartclub_test@localhost:5432/smartclub_test
      DJANGO_SETTINGS_MODULE: smartclub.settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          pip install -r backend/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check backend/ || true

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v \
            --cov=. --cov-report=xml \
            --cov-fail-under=35

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
        continue-on-error: true

  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm deps
        working-directory: frontend
        run: npm install

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build
