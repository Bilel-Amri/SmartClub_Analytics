services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartclub}
      POSTGRES_USER: ${POSTGRES_USER:-smartclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartclub_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartclub}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_ML_DEPS: ${INSTALL_ML_DEPS:-0}
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: smartclub.settings
      DATABASE_URL: postgres://${POSTGRES_USER:-smartclub}:${POSTGRES_PASSWORD:-smartclub_dev}@db:5432/${POSTGRES_DB:-smartclub}
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - ./seed:/seed
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pg_data:
